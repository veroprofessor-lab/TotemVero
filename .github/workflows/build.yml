name: Compilar APK do Totem

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Baixar Codigo do Repositorio
      uses: actions/checkout@v4

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Instalar Dependencias do Linux e Buildozer
      run: |
        sudo apt update
        sudo apt install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev libgomp1
        pip3 install --user buildozer

    - name: Compilar APK
      run: |
        # Usamos uma variável de ambiente do próprio Android para aceitar as licenças sem travar o terminal
        export ANDROID_NDK_HOME=$HOME/.buildozer/android/platform/android-ndk-r26b
        
        # Roda o Buildozer no modo de compilação direta
        ~/.local/bin/buildozer android debug
