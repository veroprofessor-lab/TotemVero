name: Compilar APK do Totem

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Baixar Codigo do Repositorio
      uses: actions/checkout@v4

    - name: Configurar Python 3.10 Estável
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Instalar Dependencias Robustas de Video e Compilacao
      run: |
        sudo apt update
        # Instala tudo o que o motor de vídeo (FFmpeg/FFpyplayer) e gráfico (SDL2) precisam para compilar código nativo
        sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev libgomp1 gcc g++ make patch lldb libasound2-dev libpulse-dev
        pip3 install --user "buildozer==1.5.0" "Cython==0.29.36" virtualenv

   - name: Compilar APK
      run: |
        export PATH=$PATH:$HOME/.local/bin
        
        # Roda o build salvando tudo o que acontece num arquivo chamado log_erro.txt
        buildozer -v android debug > log_erro.txt 2>&1 || true
        
        # Se quebrar, exibe na tela as últimas 100 linhas do erro real para a gente ver
        echo "=== FIM DO LOG / ERRO REAL ==="
        tail -n 100 log_erro.txt
        
        # Força o GitHub a nos dar o status real se falhar
        if grep -q "Listing text" log_erro.txt; then
          echo "APK Criado!"
        else
          exit 1
        fi
