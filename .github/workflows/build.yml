name: Compilar APK do Totem

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    # Usamos o Ubuntu 20.04 que tem as ferramentas de sistema perfeitas para o Kivy
    runs-on: ubuntu-20.04

    steps:
    - name: Baixar Codigo do Repositorio
      uses: actions/checkout@v4

    - name: Configurar Python 3.10 Estável
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Instalar Dependencias do Linux e Buildozer
      run: |
        sudo apt update
        sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev libgomp1
        # Forçamos uma versão do Buildozer que sabemos que funciona perfeitamente com essa estrutura
        pip3 install --user "buildozer==1.5.0" Cython virtualenv

    - name: Compilar APK
      run: |
        # Adiciona o caminho do Buildozer ao sistema para o Linux encontrar o comando
        export PATH=$PATH:$HOME/.local/bin
        
        # Roda o Buildozer mostrando linha por linha na tela para não esconder nenhum erro
        buildozer -v android debug
