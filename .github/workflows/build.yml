name: Compilar APK do Totem

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Baixar Codigo do Repositorio
      uses: actions/checkout@v4

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Instalar Dependencias do Linux e Buildozer
      run: |
        sudo apt update
        sudo apt install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev libgomp1
        pip3 install --user buildozer

    - name: Aceitar Licencas do Android SDK
      run: |
        # Instala as ferramentas de linha de comando do Android para aceitar as licenças automaticamente
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        # Força o sim (yes) para todas as perguntas de licença do SDK
        yes | sdkmanager --licenses || true

    - name: Compilar APK
      run: |
        # Passamos o sim (yes) direto para o comando do buildozer aceitar as licenças do SDK que ele vai baixar
        yes | ~/.local/bin/buildozer -v android debug
