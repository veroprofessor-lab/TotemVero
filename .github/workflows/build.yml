name: Compilar APK do Totem

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Baixar Codigo do Repositorio
      uses: actions/checkout@v4

    - name: Configurar Python 3.10 Estavel
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Instalar Dependencias Robustas de Video e Compilacao
      run: |
        sudo apt update
        sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev libgomp1 gcc g++ make patch lldb libasound2-dev libpulse-dev
        pip3 install --user "buildozer==1.5.0" "Cython==0.29.36" virtualenv
- name: Compilar APK
      run: |
        export PATH=$PATH:$HOME/.local/bin
        unset ANDROID_NDK
        unset ANDROID_NDK_HOME
        unset ANDROID_NDK_ROOT
        unset ANDROID_NDK_LATEST_HOME
        buildozer -v android debug > log_erro.txt 2>&1 || true
        echo "🔍 === EXIBINDO ULTIMAS LINHAS DO LOG ==="
        tail -n 250 log_erro.txt || true
        if ! grep -q "APK is available" log_erro.txt; then exit 1; fi
        echo "APK Criado com sucesso!"
