name: Compilar APK do Totem

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    # Voltamos para a máquina atual para sair da fila imediatamente
    runs-on: ubuntu-latest

    steps:
    - name: Baixar Codigo do Repositorio
      uses: actions/checkout@v4

    - name: Configurar Python 3.10 Estável
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Instalar Dependencias do Linux e Buildozer
      run: |
        sudo apt update
        sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev libgomp1
        # Instalamos o buildozer e o Cython exigido para compilar código C
        pip3 install --user buildozer Cython==0.29.36 virtualenv

    - name: Compilar APK
      run: |
        # Força o ambiente do terminal a usar o Python 3.10 que instalamos acima
        export PATH=$PATH:$HOME/.local/bin
        
        # Cria a pasta de segurança de licenças do Android
        mkdir -p ~/.android && touch ~/.android/repositories.cfg
        
        # Roda o Buildozer aceitando os termos nativamente
        yes | buildozer -v android debug
