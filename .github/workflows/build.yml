name: Compilar APK do Totem

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    # Travamos no Ubuntu 22.04 para ter as bibliotecas de vídeo compatíveis
    runs-on: ubuntu-22.04

    steps:
    - name: Baixar Codigo do Repositorio
      uses: actions/checkout@v4

    - name: Configurar Python 3.10 Estável
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Instalar Dependencias do Linux e Buildozer
      run: |
        sudo apt update
        sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev libgomp1
        # Instalamos as versões homologadas do Buildozer e Cython
        pip3 install --user "buildozer==1.5.0" "Cython==0.29.36" virtualenv

    - name: Compilar APK
      run: |
        export PATH=$PATH:$HOME/.local/bin
        
        # Aceita os termos do SDK diretamente nas configurações do Buildozer (sem usar o comando yes)
        buildozer -v android debug
