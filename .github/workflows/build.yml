name: Compilar APK do Totem

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Baixar Codigo do Repositorio
      uses: actions/checkout@v4

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Compilar APK com Kivy Buildozer Oficial
      uses: Mobile-Builds-Production/buildozer-action@v2
      with:
        command: buildozer -v android debug
        buildozer_version: stable

    - name: Upload do APK Pronto
      uses: actions/upload-artifact@v4
      with:
        name: TotemApp-APK
        path: bin/*.apk
